<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>Portfolio | Maeshiro Maiko</title>

        <section id="works" class="fade-in">
            <div class="container">
                <h2>Works</h2>
                <div id="works-container"></div>

        <footer id="contact" class="fade-in">
            <div class="container">
                <a id="github-link" href="#" target="_blank" class="github-btn">GitHub Profile</a>
            </div>

    <script src="config.js"></script>
