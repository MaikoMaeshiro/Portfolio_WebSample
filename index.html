<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Maeshiro Maiko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="hero">
        <div class="hero-inner">
            <h1 id="prof-name">眞榮城 舞子</h1>
            <p id="prof-title">Student Developer</p>
        </div>
    </header>

    <main>
        <section id="about" class="section-block fade-in">
            <div class="section-title"><h2>PROFILE</h2></div>
            <div class="section-content">
                <p id="prof-intro"></p>
                <div class="accordion-item">
                    <button class="acc-header">🎮 My Game History <span class="icon">+</span></button>
                    <div class="acc-body">
                        <ul id="game-list"></ul>
                    </div>
                </div>
            </div>
        </section>

        <section id="works" class="section-block fade-in">
            <div class="section-title"><h2>WORKS</h2></div>
            <div id="works-container" class="section-content">
                </div>
        </section>

        <section id="contact" class="section-block fade-in">
            <div class="section-title"><h2>CONTACT</h2></div>
            <div class="section-content">
                <a id="github-link" href="#" target="_blank" class="gh-link">GitHub Profile</a>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
